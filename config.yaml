# Monsters and Memories Macro Configuration

general:
  game_window_title: "Monsters and Memories"
  default_delay: 0.05          # Default delay between actions (seconds)
  failsafe: true               # Move mouse to corner to abort
  failsafe_key: "f12"          # Emergency stop hotkey

input:
  method: "directinput"        # "directinput" or "winmessage"
  hold_duration: 0.05          # How long to hold a key press

# Anti-detection humanization settings
# The game uses InputPatternDetector and BotBehaviorDetector
humanizer:
  enabled: true
  intensity: 0.5               # 0.0 = minimal, 1.0 = maximum randomization

# Keybinds imported from game controls.json
# Run: python3 import_keybinds.py to re-import from game
keybinds:
  # Movement
  move_forward: "w"
  move_backward: "s"
  turn_left: "a"
  turn_right: "d"
  jump: "space"
  sit: "x"
  crouch: "z"
  auto_run: "e"
  auto_attack: "q"
  assist: "f"

  # Ability bar (slots 1-10)
  ability_1: "1"
  ability_2: "2"
  ability_3: "3"
  ability_4: "4"
  ability_5: "5"
  ability_6: "6"
  ability_7: "7"
  ability_8: "8"
  ability_9: "9"
  ability_10: "0"

  # Hot buttons (Shift + number)
  hotbutton_1: "shift+1"
  hotbutton_2: "shift+2"
  hotbutton_3: "shift+3"
  hotbutton_4: "shift+4"
  hotbutton_5: "shift+5"
  hotbutton_6: "shift+6"
  hotbutton_7: "shift+7"
  hotbutton_8: "shift+8"
  hotbutton_9: "shift+9"
  hotbutton_10: "shift+0"
  hotbutton_11: "shift+-"
  hotbutton_12: "shift+="

  # Auras (Ctrl + number)
  aura_1: "ctrl+1"
  aura_2: "ctrl+2"
  aura_3: "ctrl+3"
  aura_4: "ctrl+4"
  aura_5: "ctrl+5"
  aura_6: "ctrl+6"
  aura_7: "ctrl+7"
  aura_8: "ctrl+8"
  aura_9: "ctrl+9"
  aura_10: "ctrl+0"

  # Targeting
  target_nearest: "tab"
  target_friendly: "shift+tab"
  target_nearest_friendly: "f7"
  target_nearest_hostile: "f8"
  target_last: "ctrl+tab"
  target_self: "f1"
  target_party_1: "f2"
  target_party_2: "f3"
  target_party_3: "f4"
  target_party_4: "f5"
  target_party_5: "f6"

  # UI / Social
  inventory: "i"
  bags: "shift+b"
  abilities_book: "b"
  skills_window: "p"
  social_window: "o"
  journal_window: "j"
  guild_window: "shift+g"
  interact: "u"
  inspect: "y"
  toggle_interface: "f10"
  main_menu: "alt+o"

  # Chat
  hail: "h"
  consider: "c"
  look: "l"
  tell: "t"
  reply: "r"
  retell: "shift+t"
  party: "g"

# Memory reading (direct game memory via ReadProcessMemory)
# Connects automatically on GUI startup when game is running.
# Click "Connect" in the status bar to retry if the game wasn't running at launch.
memory:
  client_typeinfo_rva: 0x54405D8 # From IL2CPP script.json — update after game patches
  poll_interval: 0.1             # How often to read game state (seconds, 0.1 = 100ms)

recording:
  save_directory: "recordings"
  capture_mouse: true
  capture_keyboard: true

screen:
  # Health bar region (x, y, width, height) - configure after setup
  health_bar: [0, 0, 200, 20]
  # Mana bar region
  mana_bar: [0, 0, 200, 20]
  # Health bar color (RGB) when full
  health_color: [0, 200, 0]
  # Mana bar color (RGB) when full
  mana_color: [0, 0, 200]
  # Color tolerance for matching
  color_tolerance: 30
