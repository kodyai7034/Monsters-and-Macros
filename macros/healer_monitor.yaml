# =============================================================================
# Reactive Monitor — Healer
# =============================================================================
# Runs in the background and heals automatically based on health thresholds.
# Can run alongside an active macro (e.g., a grinding loop).
#
# ABILITY BAR (customize to match your setup):
#   Slot 5: Fast Heal
#   Slot 6: Complete Heal (big slow heal)
#   Slot 3: Heal over Time
# =============================================================================

name: "Healer Monitor"
type: reactive
description: "Background healing — heals when health drops"
poll_interval: 0.3

rules:
  - name: "Emergency heal"
    priority: 1
    condition:
      check: mem_health_below
      value: 0.3
    cooldown: 2.0
    actions:
      - action: log
        message: "!!! EMERGENCY HEAL !!!"
      - action: use_ability
        slot: 6
      - action: wait
        duration: 3.0

  - name: "Fast heal"
    priority: 5
    condition:
      check: mem_health_below
      value: 0.5
    cooldown: 2.5
    actions:
      - action: use_ability
        slot: 5
      - action: wait
        duration: 2.0

  - name: "Maintain HoT"
    priority: 10
    condition:
      check: mem_health_below
      value: 0.8
    cooldown: 15.0
    actions:
      - action: use_ability
        slot: 3
